<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pegando fontes</title>
    <style>
        @font-face {
            font-family: 'Garet';
            src: url('Garet-Book.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        h1 {
            font-family: 'Garet', sans-serif;
            font-size: 3rem;
            color: #000000;
            text-align: center;
        }

        body {
            margin: 20px;
            color: #000000;
            background-image: linear-gradient(to right, #1612ff, #9bb2ff, #0012d8);
            min-height: 100vh;
            text-align: center;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.5;
            text-align: center;
        }
        hr {
            margin: 20px auto;
            border: none;
            border-top: 2px solid #000000;
            width: 45%;
        }
    </style>
</head>
<body>
    <h1>fight with they at night</h1>
    <hr>
    <p>Este parágrafo usa a fonte padrão do navegador, diferente do h1.</p>
</body>
</html>
