<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style> 
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        width: 400px;
        height: 400px;
        border-collapse: collapse;
        border: 5px solid rgb(66, 66, 66);
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.459);
        
    }

    td{
        border: 1px solid black;
        padding: 8px;
        text-align: center;
        vertical-align: middle;
    }
    </style>
</head>
<body>
    <h1>minha primeira tabela</h1>
    <!-- hierarquia de tabelas (simples) 
     table = tabela
     TABLE ROW = LINHAS DE TABELA
        TABE HEADER = CABEÇALHO DE TABELA
        TABLE DATA = DADOS DA TABELA
     -->
    <table>
        <tr> <!-- primeira linha -->
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr class="linha"> <!-- segunda linha -->
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr> <!-- terceira linha -->
            <td>A3</td>
            <td class="pamonha">B3</td>
            <td>C3</td> 
        </tr>

        <tr> <!-- quarta linha -->
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>
    </table>
</body>
</html>
