<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hover</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; 
        }

        div > p {
            display: none;
        }

        div:hover > p {
            display: block;
            color: rgb(255, 255, 255);
            background-color: rgb(128, 0, 0);
            padding: 4px;
        }

        div:hover {
            color: rgb(255, 255, 255);
        }
    </style>
</head>
<body>
    <h1>exemplo de hover</h1>
    <p>Passe o mouse sobre o texto para ver a mudança de cor.</p>
    <div>passe o mouse sobre mim
        <p>texto escondido...</p>
    </div>
</body>
</html>
